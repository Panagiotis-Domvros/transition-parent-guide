<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover" />
  <title>Mobile Image Gallery</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      user-select: none;
      -webkit-user-select: none;
      touch-action: pan-x pan-y pinch-zoom;
      -ms-touch-action: pan-x pan-y pinch-zoom;
    }

    body {
      padding: env(safe-area-inset-top) env(safe-area-inset-right)
               env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    .viewer {
      position: relative;
      width: 100vw;
      height: 100dvh;
      overflow: hidden;
      background: #000;
      display: grid;
      place-items: center;
      touch-action: pan-x pan-y pinch-zoom;
      -ms-touch-action: pan-x pan-y pinch-zoom;
    }

    .slide {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      background: #000;
      -webkit-user-drag: none;
      user-select: none;
      -webkit-user-select: none;
      opacity: 1;
      transition: opacity 120ms ease;
    }

    .slide.loading {
      opacity: .35;
    }

    .loader {
      position: fixed;
      left: 50%;
      bottom: calc(16px + env(safe-area-inset-bottom));
      transform: translateX(-50%);
      z-index: 20;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(0, 0, 0, .72);
      color: #fff;
      font: 500 13px/1.2 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      pointer-events: none;
      opacity: 0;
      transition: opacity 120ms ease;
      white-space: nowrap;
    }

    .loader.visible {
      opacity: .95;
    }

    @media (prefers-reduced-motion: reduce) {
      .slide,
      .loader {
        transition-duration: 1ms;
      }
    }
  </style>
</head>

<body>
  <main class="viewer" id="viewer" aria-label="Tap or swipe to change image. Pinch with two fingers to zoom.">
    <img
      class="slide"
      id="currentSlide"
      src="1.png"
      alt="Image 1"
      draggable="false"
      decoding="async"
      fetchpriority="high"
    />
    <div class="loader" id="loader">Loading image…</div>
  </main>

  <script>
    const totalImages = 17;
    const viewer = document.getElementById("viewer");
    const currentSlide = document.getElementById("currentSlide");
    const loader = document.getElementById("loader");

    let currentIndex = 1;
    let isChanging = false;
    let startX = 0;
    let startY = 0;
    let touchStarted = false;
    let multiTouchHappened = false;
    let preloadTimer = null;

    const cache = new Map();

    function imagePath(index) {
      return `${index}.png`;
    }

    function wrapIndex(index) {
      if (index < 1) return totalImages;
      if (index > totalImages) return 1;
      return index;
    }

    function nextIndex(direction) {
      return direction === "prev" ? wrapIndex(currentIndex - 1) : wrapIndex(currentIndex + 1);
    }

    function pageIsZoomed() {
      return window.visualViewport && window.visualViewport.scale > 1.05;
    }

    function showLoader() {
      loader.classList.add("visible");
      currentSlide.classList.add("loading");
    }

    function hideLoader() {
      loader.classList.remove("visible");
      currentSlide.classList.remove("loading");
    }

    function preload(index) {
      index = wrapIndex(index);
      if (cache.has(index)) return cache.get(index);

      const img = new Image();
      img.decoding = "async";
      img.src = imagePath(index);
      cache.set(index, img);
      return img;
    }

    function waitFor(img) {
      if (img.complete && img.naturalWidth > 0) return Promise.resolve();

      return new Promise((resolve) => {
        img.onload = resolve;
        img.onerror = resolve;
      });
    }

    function preloadNextOnly() {
      clearTimeout(preloadTimer);
      preloadTimer = setTimeout(() => {
        preload(wrapIndex(currentIndex + 1));

        // Keep memory low on older mobile phones.
        for (const index of cache.keys()) {
          const distance = Math.min(
            Math.abs(index - currentIndex),
            totalImages - Math.abs(index - currentIndex)
          );
          if (distance > 1) cache.delete(index);
        }
      }, 1200);
    }

    async function changeSlide(direction = "next") {
      if (isChanging || pageIsZoomed()) return;
      isChanging = true;

      const target = nextIndex(direction);
      const img = preload(target);

      if (!(img.complete && img.naturalWidth > 0)) showLoader();
      await waitFor(img);
      hideLoader();

      currentIndex = target;
      currentSlide.src = imagePath(currentIndex);
      currentSlide.alt = `Image ${currentIndex}`;

      isChanging = false;
      preloadNextOnly();
    }

    function finishGesture(endX, endY) {
      if (!touchStarted || multiTouchHappened || pageIsZoomed()) {
        touchStarted = false;
        multiTouchHappened = false;
        return;
      }

      const diffX = endX - startX;
      const diffY = endY - startY;
      const horizontalSwipe = Math.abs(diffX) > 40 && Math.abs(diffX) > Math.abs(diffY) * 1.25;
      const tap = Math.abs(diffX) < 14 && Math.abs(diffY) < 14;

      touchStarted = false;

      if (horizontalSwipe) {
        changeSlide(diffX < 0 ? "next" : "prev");
      } else if (tap) {
        changeSlide("next");
      }
    }

    // Touch events are passive and never call preventDefault().
    // This keeps native mobile pinch-zoom fast.
    viewer.addEventListener("touchstart", (event) => {
      if (event.touches.length > 1) {
        multiTouchHappened = true;
        touchStarted = false;
        return;
      }

      const t = event.touches[0];
      startX = t.clientX;
      startY = t.clientY;
      touchStarted = true;
      multiTouchHappened = false;
    }, { passive: true });

    viewer.addEventListener("touchmove", (event) => {
      if (event.touches.length > 1) {
        multiTouchHappened = true;
        touchStarted = false;
      }
    }, { passive: true });

    viewer.addEventListener("touchend", (event) => {
      if (!event.changedTouches.length) return;
      const t = event.changedTouches[0];
      finishGesture(t.clientX, t.clientY);
    }, { passive: true });

    viewer.addEventListener("touchcancel", () => {
      touchStarted = false;
      multiTouchHappened = false;
    }, { passive: true });

    // Mouse / trackpad support for desktop testing.
    viewer.addEventListener("pointerdown", (event) => {
      if (event.pointerType === "touch") return;
      if (event.pointerType === "mouse" && event.button !== 0) return;
      startX = event.clientX;
      startY = event.clientY;
      touchStarted = true;
      multiTouchHappened = false;
    });

    viewer.addEventListener("pointerup", (event) => {
      if (event.pointerType === "touch") return;
      finishGesture(event.clientX, event.clientY);
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "ArrowRight" || event.key === " ") changeSlide("next");
      if (event.key === "ArrowLeft") changeSlide("prev");
    });

    // Do not preload until the first image has finished displaying.
    if (currentSlide.complete && currentSlide.naturalWidth > 0) {
      preloadNextOnly();
    } else {
      currentSlide.addEventListener("load", preloadNextOnly, { once: true });
    }
  </script>
</body>
</html>
