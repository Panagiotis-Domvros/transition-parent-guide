<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover" />
  <title>Ultra Fast Mobile Image Gallery</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: #000;
      color: #fff;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      touch-action: pan-x pan-y pinch-zoom;
      overscroll-behavior: contain;
    }

    .viewer {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100vw;
      height: 100dvh;
      background: #000;
      overflow: hidden;
      padding: env(safe-area-inset-top) env(safe-area-inset-right)
               env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    #slide {
      display: block;
      max-width: 100vw;
      max-height: 100dvh;
      width: auto;
      height: auto;
      object-fit: contain;
      object-position: center;
      user-select: none;
      -webkit-user-drag: none;
      image-rendering: auto;
    }

    .nav {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      z-index: 5;
      border: 0;
      border-radius: 999px;
      width: 44px;
      height: 44px;
      background: rgba(0, 0, 0, .45);
      color: #fff;
      font-size: 28px;
      line-height: 44px;
      text-align: center;
      cursor: pointer;
    }

    .nav:active {
      transform: translateY(-50%) scale(.96);
    }

    .prev { left: 10px; }
    .next { right: 10px; }

    .counter {
      position: fixed;
      left: 50%;
      bottom: calc(10px + env(safe-area-inset-bottom));
      transform: translateX(-50%);
      z-index: 6;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(0, 0, 0, .55);
      font-size: 13px;
    }

    .open-link {
      position: fixed;
      right: 10px;
      bottom: calc(10px + env(safe-area-inset-bottom));
      z-index: 6;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(0, 0, 0, .55);
      color: #fff;
      text-decoration: none;
      font-size: 13px;
    }

    .loading {
      position: fixed;
      left: 10px;
      bottom: calc(10px + env(safe-area-inset-bottom));
      z-index: 6;
      display: none;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(0, 0, 0, .55);
      font-size: 13px;
    }

    body.is-loading .loading {
      display: block;
    }

    @media (max-width: 600px) {
      .nav {
        width: 38px;
        height: 38px;
        line-height: 38px;
        font-size: 24px;
      }

      .counter,
      .open-link,
      .loading {
        font-size: 12px;
      }
    }
  </style>
</head>

<body>
  <main class="viewer" id="viewer" aria-label="Image gallery. Swipe, tap arrows, or pinch to zoom.">
    <img id="slide" src="1.png" alt="Image 1" draggable="false" decoding="async" fetchpriority="high" />
  </main>

  <button class="nav prev" id="prevBtn" type="button" aria-label="Previous image">‹</button>
  <button class="nav next" id="nextBtn" type="button" aria-label="Next image">›</button>
  <div class="counter" id="counter">1 / 17</div>
  <div class="loading" id="loading">Loading…</div>
  <a class="open-link" id="openLink" href="1.png" target="_blank" rel="noopener">Open image</a>

  <script>
    /*
      ULTRA-LIGHT VERSION
      - No startup preloading
      - No flip animation
      - No custom pinch-zoom JavaScript
      - Uses native phone pinch-zoom
      - Loads only the image the user requests

      For major speed gains, replace 1.png, 2.png, etc. with compressed WebP/JPG files.
    */

    const totalImages = 17;
    const viewer = document.getElementById("viewer");
    const slide = document.getElementById("slide");
    const counter = document.getElementById("counter");
    const openLink = document.getElementById("openLink");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");

    let currentIndex = 1;
    let loading = false;
    let touchStartX = 0;
    let touchStartY = 0;
    let touchStartTime = 0;
    let multiTouch = false;

    function imagePath(index) {
      return `${index}.png`;
    }

    function normalizeIndex(index) {
      if (index < 1) return totalImages;
      if (index > totalImages) return 1;
      return index;
    }

    function updateUi(index) {
      counter.textContent = `${index} / ${totalImages}`;
      openLink.href = imagePath(index);
      slide.alt = `Image ${index}`;
    }

    function show(index) {
      if (loading) return;

      const nextIndex = normalizeIndex(index);
      if (nextIndex === currentIndex) return;

      loading = true;
      document.body.classList.add("is-loading");

      const src = imagePath(nextIndex);
      const testImage = new Image();
      testImage.decoding = "async";

      testImage.onload = () => {
        slide.src = src;
        currentIndex = nextIndex;
        updateUi(currentIndex);
        loading = false;
        document.body.classList.remove("is-loading");
      };

      testImage.onerror = () => {
        loading = false;
        document.body.classList.remove("is-loading");
        alert(`Could not load ${src}`);
      };

      testImage.src = src;
    }

    function next() {
      show(currentIndex + 1);
    }

    function previous() {
      show(currentIndex - 1);
    }

    prevBtn.addEventListener("click", previous);
    nextBtn.addEventListener("click", next);

    // Single-finger swipe only. Multi-touch is ignored so native pinch-zoom can work.
    viewer.addEventListener("touchstart", (event) => {
      multiTouch = event.touches.length > 1;
      if (multiTouch) return;

      const touch = event.changedTouches[0];
      touchStartX = touch.clientX;
      touchStartY = touch.clientY;
      touchStartTime = Date.now();
    }, { passive: true });

    viewer.addEventListener("touchend", (event) => {
      if (multiTouch) {
        multiTouch = false;
        return;
      }

      const touch = event.changedTouches[0];
      const diffX = touch.clientX - touchStartX;
      const diffY = touch.clientY - touchStartY;
      const elapsed = Date.now() - touchStartTime;

      const horizontalSwipe = Math.abs(diffX) > 50 && Math.abs(diffX) > Math.abs(diffY) * 1.25;
      const quickTap = Math.abs(diffX) < 12 && Math.abs(diffY) < 12 && elapsed < 350;

      if (horizontalSwipe) {
        diffX < 0 ? next() : previous();
      } else if (quickTap) {
        next();
      }
    }, { passive: true });

    document.addEventListener("keydown", (event) => {
      if (event.key === "ArrowRight" || event.key === " ") next();
      if (event.key === "ArrowLeft") previous();
    });

    slide.addEventListener("load", () => updateUi(currentIndex), { once: true });
  </script>
</body>
</html>
