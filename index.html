<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Mobile Image Flip Gallery</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      user-select: none;
      touch-action: none;
    }

    body {
      padding: env(safe-area-inset-top) env(safe-area-inset-right)
               env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    .viewer {
      position: relative;
      width: 100vw;
      height: 100dvh;
      overflow: hidden;
      background: #000;
      perspective: 1400px;
    }

    .slide {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      background: #000;
      backface-visibility: hidden;
      transform-origin: center center;
      -webkit-user-drag: none;
      user-select: none;
      will-change: transform, opacity;
    }

    .slide.current {
      transform: translateX(0) rotateY(0deg) scale(1);
      opacity: 1;
      z-index: 1;
    }

    .slide.incoming {
      z-index: 2;
    }

    .slide.out-next {
      animation: outNext 520ms cubic-bezier(.22,.9,.28,1) both;
    }

    .slide.in-next {
      animation: inNext 520ms cubic-bezier(.22,.9,.28,1) both;
    }

    .slide.out-prev {
      animation: outPrev 520ms cubic-bezier(.22,.9,.28,1) both;
    }

    .slide.in-prev {
      animation: inPrev 520ms cubic-bezier(.22,.9,.28,1) both;
    }

    @keyframes outNext {
      from {
        transform: translateX(0) rotateY(0deg) scale(1);
        opacity: 1;
      }
      to {
        transform: translateX(-18%) rotateY(-18deg) scale(.985);
        opacity: 0;
      }
    }

    @keyframes inNext {
      from {
        transform: translateX(18%) rotateY(18deg) scale(.985);
        opacity: 0;
      }
      to {
        transform: translateX(0) rotateY(0deg) scale(1);
        opacity: 1;
      }
    }

    @keyframes outPrev {
      from {
        transform: translateX(0) rotateY(0deg) scale(1);
        opacity: 1;
      }
      to {
        transform: translateX(18%) rotateY(18deg) scale(.985);
        opacity: 0;
      }
    }

    @keyframes inPrev {
      from {
        transform: translateX(-18%) rotateY(-18deg) scale(.985);
        opacity: 0;
      }
      to {
        transform: translateX(0) rotateY(0deg) scale(1);
        opacity: 1;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .slide.out-next,
      .slide.in-next,
      .slide.out-prev,
      .slide.in-prev {
        animation-duration: 1ms;
      }
    }
  </style>
</head>

<body>
  <main class="viewer" id="viewer" aria-label="Tap or swipe to flip through images">
    <img class="slide current" id="currentSlide" src="1.png" alt="Image 1" draggable="false" />
  </main>

  <script>
    const totalImages = 17;
    const viewer = document.getElementById("viewer");

    let currentIndex = 1;
    let currentSlide = document.getElementById("currentSlide");
    let isAnimating = false;

    let startX = 0;
    let startY = 0;
    let pointerDown = false;

    const cache = new Map();

    function preloadImages() {
      for (let i = 1; i <= totalImages; i++) {
        const img = new Image();
        img.src = `${i}.png`;
        cache.set(i, img);
      }
    }

    function getTargetIndex(direction) {
      if (direction === "prev") {
        return currentIndex === 1 ? totalImages : currentIndex - 1;
      }

      return currentIndex === totalImages ? 1 : currentIndex + 1;
    }

    function waitForImage(img) {
      if (img.complete) return Promise.resolve();

      return new Promise((resolve) => {
        img.onload = resolve;
        img.onerror = resolve;
      });
    }

    async function flip(direction = "next") {
      if (isAnimating) return;
      isAnimating = true;

      const targetIndex = getTargetIndex(direction);

      const incoming = document.createElement("img");
      incoming.className = "slide incoming";
      incoming.src = `${targetIndex}.png`;
      incoming.alt = `Image ${targetIndex}`;
      incoming.draggable = false;

      await waitForImage(incoming);

      viewer.appendChild(incoming);

      const outClass = direction === "prev" ? "out-prev" : "out-next";
      const inClass = direction === "prev" ? "in-prev" : "in-next";

      requestAnimationFrame(() => {
        currentSlide.classList.add(outClass);
        incoming.classList.add(inClass);
      });

      incoming.addEventListener(
        "animationend",
        () => {
          currentSlide.remove();

          incoming.className = "slide current";
          incoming.id = "currentSlide";

          currentSlide = incoming;
          currentIndex = targetIndex;
          isAnimating = false;
        },
        { once: true }
      );
    }

    viewer.addEventListener("pointerdown", (event) => {
      pointerDown = true;
      startX = event.clientX;
      startY = event.clientY;
    });

    viewer.addEventListener("pointerup", (event) => {
      if (!pointerDown) return;

      pointerDown = false;

      const diffX = event.clientX - startX;
      const diffY = event.clientY - startY;

      const isHorizontalSwipe =
        Math.abs(diffX) > 45 && Math.abs(diffX) > Math.abs(diffY);

      if (isHorizontalSwipe) {
        flip(diffX < 0 ? "next" : "prev");
      } else {
        flip("next");
      }
    });

    viewer.addEventListener("pointercancel", () => {
      pointerDown = false;
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "ArrowRight" || event.key === " ") flip("next");
      if (event.key === "ArrowLeft") flip("prev");
    });

    preloadImages();
  </script>
</body>
</html>
