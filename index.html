<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Mobile JPG Gallery - Clean</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      user-select: none;
      -webkit-user-select: none;
      overscroll-behavior: none;
    }

    body {
      padding: env(safe-area-inset-top) env(safe-area-inset-right)
               env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    .viewer {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100dvh;
      overflow: hidden;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: none;
    }

    .slide {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      display: block;
      background: #000;
      -webkit-user-drag: none;
      user-select: none;
      transform-origin: center center;
      will-change: transform;
    }

    .message {
      position: fixed;
      left: 50%;
      bottom: max(18px, env(safe-area-inset-bottom));
      transform: translateX(-50%);
      z-index: 20;
      padding: 8px 12px;
      max-width: calc(100vw - 32px);
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.62);
      color: #fff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      line-height: 1.2;
      opacity: 0;
      pointer-events: none;
      transition: opacity 160ms ease;
      white-space: nowrap;
    }

    .message.visible {
      opacity: 1;
    }
  </style>
</head>

<body>
  <main class="viewer" id="viewer" aria-label="Swipe, tap, or pinch to view images">
    <img class="slide" id="slide" src="1.jpg" alt="Image 1" draggable="false" />
  </main>

  <div class="message" id="message" aria-live="polite"></div>

  <script>
    const totalImages = 17;
    const imageFiles = Array.from({ length: totalImages }, (_, i) => `${i + 1}.jpg`);

    const viewer = document.getElementById("viewer");
    const slide = document.getElementById("slide");
    const message = document.getElementById("message");

    let currentIndex = 0;

    let scale = 1;
    let translateX = 0;
    let translateY = 0;

    let startX = 0;
    let startY = 0;
    let lastX = 0;
    let lastY = 0;
    let moved = false;

    let isPinching = false;
    let pinchStartDistance = 0;
    let pinchStartScale = 1;
    let pinchStartMidX = 0;
    let pinchStartMidY = 0;
    let pinchStartTranslateX = 0;
    let pinchStartTranslateY = 0;

    let suppressClickUntil = 0;
    let messageTimer = null;

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function showMessage(text) {
      message.textContent = text;
      message.classList.add("visible");
      clearTimeout(messageTimer);
      messageTimer = setTimeout(() => {
        message.classList.remove("visible");
      }, 1200);
    }

    function applyTransform() {
      slide.style.transform = `translate3d(${translateX}px, ${translateY}px, 0) scale(${scale})`;
    }

    function resetZoom() {
      scale = 1;
      translateX = 0;
      translateY = 0;
      applyTransform();
    }

    function goTo(index) {
      const nextIndex = clamp(index, 0, totalImages - 1);
      if (nextIndex === currentIndex) return;

      currentIndex = nextIndex;
      resetZoom();
      slide.alt = `Image ${currentIndex + 1}`;
      slide.src = imageFiles[currentIndex];
    }

    function nextImage() {
      if (currentIndex < totalImages - 1) {
        goTo(currentIndex + 1);
      } else {
        showMessage("Last image");
      }
    }

    function previousImage() {
      if (currentIndex > 0) {
        goTo(currentIndex - 1);
      } else {
        showMessage("First image");
      }
    }

    function distance(touchA, touchB) {
      const dx = touchA.clientX - touchB.clientX;
      const dy = touchA.clientY - touchB.clientY;
      return Math.hypot(dx, dy);
    }

    function midpoint(touchA, touchB) {
      return {
        x: (touchA.clientX + touchB.clientX) / 2,
        y: (touchA.clientY + touchB.clientY) / 2
      };
    }


    viewer.addEventListener("touchstart", (event) => {
      suppressClickUntil = Date.now() + 450;

      if (event.touches.length === 2) {
        isPinching = true;
        pinchStartDistance = distance(event.touches[0], event.touches[1]);
        pinchStartScale = scale;

        const mid = midpoint(event.touches[0], event.touches[1]);
        pinchStartMidX = mid.x;
        pinchStartMidY = mid.y;
        pinchStartTranslateX = translateX;
        pinchStartTranslateY = translateY;

        event.preventDefault();
        return;
      }

      if (event.touches.length === 1) {
        isPinching = false;
        moved = false;
        startX = event.touches[0].clientX;
        startY = event.touches[0].clientY;
        lastX = startX;
        lastY = startY;
      }
    }, { passive: false });

    viewer.addEventListener("touchmove", (event) => {
      if (event.touches.length === 2) {
        const newDistance = distance(event.touches[0], event.touches[1]);
        const newScale = clamp(pinchStartScale * (newDistance / pinchStartDistance), 1, 4);
        const mid = midpoint(event.touches[0], event.touches[1]);

        scale = newScale;
        translateX = pinchStartTranslateX + (mid.x - pinchStartMidX);
        translateY = pinchStartTranslateY + (mid.y - pinchStartMidY);

        applyTransform();
        moved = true;
        event.preventDefault();
        return;
      }

      if (event.touches.length === 1) {
        const x = event.touches[0].clientX;
        const y = event.touches[0].clientY;
        const dx = x - lastX;
        const dy = y - lastY;

        if (Math.abs(x - startX) > 6 || Math.abs(y - startY) > 6) {
          moved = true;
        }

        if (scale > 1) {
          translateX += dx;
          translateY += dy;
          applyTransform();
          event.preventDefault();
        }

        lastX = x;
        lastY = y;
      }
    }, { passive: false });

    viewer.addEventListener("touchend", (event) => {
      if (event.touches.length > 0) return;

      if (isPinching) {
        isPinching = false;
        if (scale <= 1.03) resetZoom();
        event.preventDefault();
        return;
      }

      const diffX = lastX - startX;
      const diffY = lastY - startY;
      const isHorizontalSwipe = Math.abs(diffX) > 45 && Math.abs(diffX) > Math.abs(diffY);

      if (scale > 1) {
        event.preventDefault();
        return;
      }

      if (isHorizontalSwipe) {
        // Standard mobile gallery behaviour: swipe left = next, swipe right = previous.
        if (diffX < 0) nextImage();
        else previousImage();
        event.preventDefault();
        return;
      }

      if (!moved) {
        nextImage();
        event.preventDefault();
      }
    }, { passive: false });

    viewer.addEventListener("touchcancel", () => {
      isPinching = false;
      moved = false;
    });

    viewer.addEventListener("click", () => {
      if (Date.now() < suppressClickUntil) return;
      if (scale === 1) nextImage();
    });

    slide.addEventListener("dblclick", () => {
      resetZoom();
    });

    slide.addEventListener("error", () => {
      showMessage(`Missing or failed image: ${imageFiles[currentIndex]}`);
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "ArrowRight" || event.key === " ") nextImage();
      if (event.key === "ArrowLeft") previousImage();
      if (event.key === "Escape") resetZoom();
    });
  </script>
</body>
</html>
