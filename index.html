<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover" />
  <title>Mobile Image Gallery</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: #000;
      -webkit-text-size-adjust: 100%;
    }

    body {
      overflow: auto;
      user-select: none;
      -webkit-user-select: none;
      overscroll-behavior: contain;
    }

    .viewer {
      position: relative;
      width: 100vw;
      height: 100vh;
      height: 100svh;
      height: 100dvh;
      max-width: 100vw;
      max-height: 100dvh;
      overflow: hidden;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .slide {
      position: absolute;
      inset: 0;
      display: block;
      width: 100%;
      height: 100%;
      max-width: 100%;
      max-height: 100%;
      min-width: 0;
      min-height: 0;
      object-fit: contain;
      object-position: center center;
      background: #000;
      -webkit-user-drag: none;
      user-select: none;
      -webkit-user-select: none;
      opacity: 1;
      transition: opacity 110ms ease;
    }

    .slide.loading {
      opacity: .38;
    }

    .loader,
    .counter,
    .open-image {
      position: fixed;
      z-index: 20;
      border: 0;
      border-radius: 999px;
      background: rgba(0, 0, 0, .72);
      color: #fff;
      font: 600 13px/1.2 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      pointer-events: none;
      white-space: nowrap;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .loader {
      left: 50%;
      bottom: calc(16px + env(safe-area-inset-bottom));
      transform: translateX(-50%);
      padding: 8px 12px;
      opacity: 0;
      transition: opacity 110ms ease;
    }

    .loader.visible {
      opacity: .95;
    }

    .counter {
      left: calc(12px + env(safe-area-inset-left));
      bottom: calc(12px + env(safe-area-inset-bottom));
      padding: 7px 10px;
      opacity: .75;
    }

    .open-image {
      right: calc(12px + env(safe-area-inset-right));
      bottom: calc(12px + env(safe-area-inset-bottom));
      padding: 7px 10px;
      pointer-events: auto;
      text-decoration: none;
      opacity: .75;
    }

    .open-image:active {
      opacity: 1;
    }

    @media (prefers-reduced-motion: reduce) {
      .slide,
      .loader {
        transition-duration: 1ms;
      }
    }
  </style>
</head>

<body>
  <main class="viewer" id="viewer" aria-label="Tap or swipe to change image. Pinch to zoom. Use Open image for full native image zoom.">
    <img
      class="slide"
      id="currentSlide"
      src="1.png"
      alt="Image 1"
      draggable="false"
      decoding="async"
      fetchpriority="high"
    />
    <div class="loader" id="loader">Loading image…</div>
    <div class="counter" id="counter">1 / 17</div>
    <a class="open-image" id="openImage" href="1.png" target="_blank" rel="noopener">Open image</a>
  </main>

  <script>
    const totalImages = 17;
    const viewer = document.getElementById("viewer");
    const currentSlide = document.getElementById("currentSlide");
    const loader = document.getElementById("loader");
    const counter = document.getElementById("counter");
    const openImage = document.getElementById("openImage");

    let currentIndex = 1;
    let isChanging = false;
    let startX = 0;
    let startY = 0;
    let gestureStarted = false;
    let multiTouchHappened = false;
    let preloadTimer = null;

    const cache = new Map();

    function imagePath(index) {
      return `${index}.png`;
    }

    function wrapIndex(index) {
      if (index < 1) return totalImages;
      if (index > totalImages) return 1;
      return index;
    }

    function targetIndex(direction) {
      return direction === "prev" ? wrapIndex(currentIndex - 1) : wrapIndex(currentIndex + 1);
    }

    function pageIsZoomed() {
      return window.visualViewport && window.visualViewport.scale > 1.05;
    }

    function showLoader() {
      loader.classList.add("visible");
      currentSlide.classList.add("loading");
    }

    function hideLoader() {
      loader.classList.remove("visible");
      currentSlide.classList.remove("loading");
    }

    function preload(index) {
      index = wrapIndex(index);
      if (cache.has(index)) return cache.get(index);

      const img = new Image();
      img.decoding = "async";
      img.src = imagePath(index);
      cache.set(index, img);
      return img;
    }

    function waitFor(img) {
      if (img.complete && img.naturalWidth > 0) return Promise.resolve();

      return new Promise((resolve) => {
        img.onload = resolve;
        img.onerror = resolve;
      });
    }

    function updateUi() {
      counter.textContent = `${currentIndex} / ${totalImages}`;
      openImage.href = imagePath(currentIndex);
      currentSlide.alt = `Image ${currentIndex}`;
    }

    function preloadNextAfterFirstPaint() {
      clearTimeout(preloadTimer);
      preloadTimer = setTimeout(() => {
        preload(wrapIndex(currentIndex + 1));

        // Keep memory low on older phones: only keep current/next cached.
        for (const index of cache.keys()) {
          if (index !== currentIndex && index !== wrapIndex(currentIndex + 1)) {
            cache.delete(index);
          }
        }
      }, 900);
    }

    async function changeSlide(direction = "next") {
      if (isChanging || pageIsZoomed()) return;
      isChanging = true;

      const next = targetIndex(direction);
      const nextImg = preload(next);

      if (!(nextImg.complete && nextImg.naturalWidth > 0)) showLoader();
      await waitFor(nextImg);
      hideLoader();

      currentIndex = next;
      currentSlide.src = imagePath(currentIndex);
      updateUi();

      isChanging = false;
      preloadNextAfterFirstPaint();
    }

    function finishGesture(endX, endY) {
      if (!gestureStarted || multiTouchHappened || pageIsZoomed()) {
        gestureStarted = false;
        multiTouchHappened = false;
        return;
      }

      const diffX = endX - startX;
      const diffY = endY - startY;
      const horizontalSwipe = Math.abs(diffX) > 42 && Math.abs(diffX) > Math.abs(diffY) * 1.25;
      const tap = Math.abs(diffX) < 13 && Math.abs(diffY) < 13;

      gestureStarted = false;

      if (horizontalSwipe) {
        changeSlide(diffX < 0 ? "next" : "prev");
      } else if (tap) {
        changeSlide("next");
      }
    }

    // Passive touch listeners keep pinch zoom native and fast.
    viewer.addEventListener("touchstart", (event) => {
      if (event.touches.length > 1) {
        multiTouchHappened = true;
        gestureStarted = false;
        return;
      }

      const t = event.touches[0];
      startX = t.clientX;
      startY = t.clientY;
      gestureStarted = true;
      multiTouchHappened = false;
    }, { passive: true });

    viewer.addEventListener("touchmove", (event) => {
      if (event.touches.length > 1) {
        multiTouchHappened = true;
        gestureStarted = false;
      }
    }, { passive: true });

    viewer.addEventListener("touchend", (event) => {
      if (!event.changedTouches.length) return;
      const t = event.changedTouches[0];
      finishGesture(t.clientX, t.clientY);
    }, { passive: true });

    viewer.addEventListener("touchcancel", () => {
      gestureStarted = false;
      multiTouchHappened = false;
    }, { passive: true });

    viewer.addEventListener("pointerdown", (event) => {
      if (event.pointerType === "touch") return;
      if (event.pointerType === "mouse" && event.button !== 0) return;
      startX = event.clientX;
      startY = event.clientY;
      gestureStarted = true;
      multiTouchHappened = false;
    });

    viewer.addEventListener("pointerup", (event) => {
      if (event.pointerType === "touch") return;
      finishGesture(event.clientX, event.clientY);
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "ArrowRight" || event.key === " ") changeSlide("next");
      if (event.key === "ArrowLeft") changeSlide("prev");
    });

    updateUi();

    // Wait until image 1 is actually rendered before doing any background loading.
    if (currentSlide.complete && currentSlide.naturalWidth > 0) {
      preloadNextAfterFirstPaint();
    } else {
      currentSlide.addEventListener("load", preloadNextAfterFirstPaint, { once: true });
    }
  </script>
</body>
</html>
