<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover" />
  <title>Mobile Image Flip Gallery</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      user-select: none;
      overscroll-behavior: none;
    }

    body {
      padding: env(safe-area-inset-top) env(safe-area-inset-right)
               env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    .viewer {
      position: relative;
      width: 100vw;
      height: 100dvh;
      overflow: hidden;
      background: #000;
      touch-action: none;
    }

    .slide {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      background: #000;
      -webkit-user-drag: none;
      user-select: none;
      transform-origin: center center;
      transition: transform 220ms ease, opacity 220ms ease;
      opacity: 1;
    }

    .slide.current {
      z-index: 1;
    }

    .slide.incoming {
      z-index: 2;
      opacity: 0;
    }

    .slide.incoming.show {
      opacity: 1;
    }

    .loader {
      position: fixed;
      left: 50%;
      bottom: calc(16px + env(safe-area-inset-bottom));
      transform: translateX(-50%);
      z-index: 20;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(0, 0, 0, .68);
      color: #fff;
      font: 500 13px/1.2 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      pointer-events: none;
      opacity: 0;
      transition: opacity 160ms ease;
      white-space: nowrap;
    }

    .loader.visible {
      opacity: .9;
    }

    @media (prefers-reduced-motion: reduce) {
      .slide {
        transition-duration: 1ms;
      }
    }
  </style>
</head>

<body>
  <main class="viewer" id="viewer" aria-label="Tap, swipe, or pinch to zoom images">
    <img
      class="slide current"
      id="currentSlide"
      src="1.png"
      alt="Image 1"
      draggable="false"
      decoding="async"
      fetchpriority="high"
    />
    <div class="loader" id="loader">Loading image…</div>
  </main>

  <script>
    const totalImages = 17;
    const viewer = document.getElementById("viewer");
    const loader = document.getElementById("loader");

    let currentIndex = 1;
    let currentSlide = document.getElementById("currentSlide");
    let isAnimating = false;

    const imageCache = new Map();
    let preloadTimer = null;

    function imagePath(index) {
      return `${index}.png`;
    }

    function wrapIndex(index) {
      if (index < 1) return totalImages;
      if (index > totalImages) return 1;
      return index;
    }

    function getTargetIndex(direction) {
      return direction === "prev" ? wrapIndex(currentIndex - 1) : wrapIndex(currentIndex + 1);
    }

    function showLoader() {
      loader.classList.add("visible");
    }

    function hideLoader() {
      loader.classList.remove("visible");
    }

    function preloadImage(index) {
      index = wrapIndex(index);
      if (imageCache.has(index)) return imageCache.get(index);

      const img = new Image();
      img.decoding = "async";
      img.src = imagePath(index);
      imageCache.set(index, img);
      return img;
    }

    function preloadNearbyLater(index) {
      clearTimeout(preloadTimer);
      preloadTimer = setTimeout(() => {
        // Only preload ONE likely next image first. This prevents slow mobile startup.
        preloadImage(wrapIndex(index + 1));

        // Then, much later, warm the previous image if the browser is idle.
        const warmPrevious = () => preloadImage(wrapIndex(index - 1));
        if ("requestIdleCallback" in window) {
          requestIdleCallback(warmPrevious, { timeout: 2500 });
        } else {
          setTimeout(warmPrevious, 1800);
        }

        // Keep memory low on older phones.
        for (const cachedIndex of imageCache.keys()) {
          let distance = Math.abs(cachedIndex - index);
          distance = Math.min(distance, totalImages - distance);
          if (distance > 2) imageCache.delete(cachedIndex);
        }
      }, 900);
    }

    function waitForImageElement(img) {
      if (img.complete && img.naturalWidth > 0) return Promise.resolve();
      return new Promise((resolve) => {
        img.onload = resolve;
        img.onerror = resolve;
      });
    }

    async function loadSlideElement(index) {
      const incoming = document.createElement("img");
      incoming.className = "slide incoming";
      incoming.src = imagePath(index);
      incoming.alt = `Image ${index}`;
      incoming.draggable = false;
      incoming.decoding = "async";
      incoming.loading = "eager";
      return incoming;
    }

    // Zoom state
    const MIN_SCALE = 1;
    const MAX_SCALE = 4;
    let scale = 1;
    let translateX = 0;
    let translateY = 0;

    let startX = 0;
    let startY = 0;
    let gestureStarted = false;
    let lastTapTime = 0;

    let isPanning = false;
    let panStartX = 0;
    let panStartY = 0;
    let panBaseX = 0;
    let panBaseY = 0;

    let isPinching = false;
    let pinchStartDistance = 0;
    let pinchStartScale = 1;

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function getDistance(a, b) {
      return Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY);
    }

    function clampPan() {
      if (scale <= 1) {
        translateX = 0;
        translateY = 0;
        return;
      }
      const maxX = ((scale - 1) * viewer.clientWidth) / 2;
      const maxY = ((scale - 1) * viewer.clientHeight) / 2;
      translateX = clamp(translateX, -maxX, maxX);
      translateY = clamp(translateY, -maxY, maxY);
    }

    function applyZoom() {
      clampPan();
      currentSlide.style.transform = `translate3d(${translateX}px, ${translateY}px, 0) scale(${scale})`;
    }

    function resetZoom() {
      scale = 1;
      translateX = 0;
      translateY = 0;
      if (currentSlide) currentSlide.style.transform = "";
    }

    async function flip(direction = "next") {
      if (isAnimating) return;
      isAnimating = true;
      resetZoom();

      const targetIndex = getTargetIndex(direction);
      const incoming = await loadSlideElement(targetIndex);
      viewer.insertBefore(incoming, loader);

      if (!incoming.complete) showLoader();
      await waitForImageElement(incoming);
      hideLoader();

      requestAnimationFrame(() => {
        const shift = direction === "prev" ? 30 : -30;
        currentSlide.style.transform = `translate3d(${shift}px, 0, 0)`;
        currentSlide.style.opacity = "0";
        incoming.classList.add("show");
      });

      setTimeout(() => {
        currentSlide.remove();
        incoming.className = "slide current";
        incoming.id = "currentSlide";
        incoming.style.transform = "";
        incoming.style.opacity = "1";

        currentSlide = incoming;
        currentIndex = targetIndex;
        isAnimating = false;
        preloadNearbyLater(currentIndex);
      }, 240);
    }

    function startNavigation(x, y) {
      if (scale > 1 || isPinching) return;
      gestureStarted = true;
      startX = x;
      startY = y;
    }

    function finishNavigation(x, y) {
      if (!gestureStarted || scale > 1 || isPinching) return;
      gestureStarted = false;

      const diffX = x - startX;
      const diffY = y - startY;
      const horizontalSwipe = Math.abs(diffX) > 35 && Math.abs(diffX) > Math.abs(diffY) * 1.25;
      const tap = Math.abs(diffX) < 12 && Math.abs(diffY) < 12;

      if (horizontalSwipe) flip(diffX < 0 ? "next" : "prev");
      else if (tap) flip("next");
    }

    viewer.addEventListener("touchstart", (event) => {
      if (event.touches.length === 2) {
        event.preventDefault();
        gestureStarted = false;
        isPinching = true;
        pinchStartDistance = getDistance(event.touches[0], event.touches[1]);
        pinchStartScale = scale;
        return;
      }

      if (event.touches.length === 1) {
        const t = event.touches[0];
        if (scale > 1) {
          event.preventDefault();
          isPanning = true;
          panStartX = t.clientX;
          panStartY = t.clientY;
          panBaseX = translateX;
          panBaseY = translateY;
        } else {
          startNavigation(t.clientX, t.clientY);
        }
      }
    }, { passive: false });

    viewer.addEventListener("touchmove", (event) => {
      if (event.touches.length === 2 && isPinching) {
        event.preventDefault();
        const distance = getDistance(event.touches[0], event.touches[1]);
        scale = clamp((distance / pinchStartDistance) * pinchStartScale, MIN_SCALE, MAX_SCALE);
        applyZoom();
        return;
      }

      if (event.touches.length === 1 && isPanning && scale > 1) {
        event.preventDefault();
        const t = event.touches[0];
        translateX = panBaseX + t.clientX - panStartX;
        translateY = panBaseY + t.clientY - panStartY;
        applyZoom();
      }
    }, { passive: false });

    viewer.addEventListener("touchend", (event) => {
      if (isPinching && event.touches.length < 2) {
        event.preventDefault();
        isPinching = false;
        if (scale <= 1.03) resetZoom();
        else applyZoom();
        return;
      }

      if (isPanning) {
        event.preventDefault();
        isPanning = false;
        return;
      }

      if (!event.changedTouches.length) return;
      const t = event.changedTouches[0];
      const now = Date.now();
      const doubleTap = now - lastTapTime < 300;
      lastTapTime = now;

      if (doubleTap) {
        event.preventDefault();
        resetZoom();
        gestureStarted = false;
        return;
      }

      finishNavigation(t.clientX, t.clientY);
    }, { passive: false });

    viewer.addEventListener("touchcancel", () => {
      gestureStarted = false;
      isPanning = false;
      isPinching = false;
    });

    viewer.addEventListener("pointerdown", (event) => {
      if (event.pointerType === "touch") return;
      if (event.pointerType === "mouse" && event.button !== 0) return;
      startNavigation(event.clientX, event.clientY);
    });

    viewer.addEventListener("pointerup", (event) => {
      if (event.pointerType === "touch") return;
      finishNavigation(event.clientX, event.clientY);
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "ArrowRight" || event.key === " ") flip("next");
      if (event.key === "ArrowLeft") flip("prev");
      if (event.key === "Escape") resetZoom();
    });

    // Important: do not preload anything until the first image is already visible.
    if (currentSlide.complete && currentSlide.naturalWidth > 0) {
      preloadNearbyLater(currentIndex);
    } else {
      currentSlide.addEventListener("load", () => preloadNearbyLater(currentIndex), { once: true });
    }
  </script>
</body>
</html>
