<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Gesture Image Gallery</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      user-select: none;
      -webkit-user-select: none;
      overscroll-behavior: none;
    }

    body {
      padding: env(safe-area-inset-top) env(safe-area-inset-right)
               env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    .viewer {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100dvh;
      overflow: hidden;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: none;
    }

    .slide {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      display: block;
      background: #000;
      -webkit-user-drag: none;
      user-select: none;
      transform-origin: center center;
      will-change: transform;
    }
  </style>
</head>

<body>
  <main class="viewer" id="viewer" aria-label="Swipe, tap, or pinch to view images">
    <img class="slide" id="slide" src="1.jpg" alt="Image 1" draggable="false" />
  </main>

  <script>
    const totalImages = 17;
    const imageFiles = Array.from({ length: totalImages }, (_, i) => `${i + 1}.jpg`);

    const viewer = document.getElementById("viewer");
    const slide = document.getElementById("slide");

    let currentIndex = 0;

    let scale = 1;
    let translateX = 0;
    let translateY = 0;

    let startX = 0;
    let startY = 0;
    let lastX = 0;
    let lastY = 0;
    let moved = false;

    let isPinching = false;
    let pinchStartDistance = 0;
    let pinchStartScale = 1;
    let pinchStartMidX = 0;
    let pinchStartMidY = 0;
    let pinchStartTranslateX = 0;
    let pinchStartTranslateY = 0;

    let suppressClickUntil = 0;
    let lastTapTime = 0;

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function applyTransform() {
      slide.style.transform = `translate3d(${translateX}px, ${translateY}px, 0) scale(${scale})`;
    }

    function resetZoom() {
      scale = 1;
      translateX = 0;
      translateY = 0;
      applyTransform();
    }

    function goTo(index) {
      const nextIndex = clamp(index, 0, totalImages - 1);
      if (nextIndex === currentIndex) return;

      currentIndex = nextIndex;
      resetZoom();
      slide.alt = `Image ${currentIndex + 1}`;
      slide.src = imageFiles[currentIndex];
    }

    function nextImage() {
      goTo(currentIndex + 1);
    }

    function previousImage() {
      goTo(currentIndex - 1);
    }

    function distance(touchA, touchB) {
      const dx = touchA.clientX - touchB.clientX;
      const dy = touchA.clientY - touchB.clientY;
      return Math.hypot(dx, dy);
    }

    function midpoint(touchA, touchB) {
      return {
        x: (touchA.clientX + touchB.clientX) / 2,
        y: (touchA.clientY + touchB.clientY) / 2
      };
    }

    viewer.addEventListener("touchstart", (event) => {
      suppressClickUntil = Date.now() + 500;

      if (event.touches.length === 2) {
        isPinching = true;
        moved = true;
        pinchStartDistance = distance(event.touches[0], event.touches[1]);
        pinchStartScale = scale;

        const mid = midpoint(event.touches[0], event.touches[1]);
        pinchStartMidX = mid.x;
        pinchStartMidY = mid.y;
        pinchStartTranslateX = translateX;
        pinchStartTranslateY = translateY;

        event.preventDefault();
        return;
      }

      if (event.touches.length === 1) {
        isPinching = false;
        moved = false;
        startX = event.touches[0].clientX;
        startY = event.touches[0].clientY;
        lastX = startX;
        lastY = startY;
      }
    }, { passive: false });

    viewer.addEventListener("touchmove", (event) => {
      if (event.touches.length === 2) {
        const newDistance = distance(event.touches[0], event.touches[1]);
        const newScale = clamp(pinchStartScale * (newDistance / pinchStartDistance), 1, 4);
        const mid = midpoint(event.touches[0], event.touches[1]);

        scale = newScale;
        translateX = pinchStartTranslateX + (mid.x - pinchStartMidX);
        translateY = pinchStartTranslateY + (mid.y - pinchStartMidY);

        applyTransform();
        moved = true;
        event.preventDefault();
        return;
      }

      if (event.touches.length === 1) {
        const x = event.touches[0].clientX;
        const y = event.touches[0].clientY;
        const dx = x - lastX;
        const dy = y - lastY;

        if (Math.abs(x - startX) > 6 || Math.abs(y - startY) > 6) {
          moved = true;
        }

        if (scale > 1) {
          translateX += dx;
          translateY += dy;
          applyTransform();
          event.preventDefault();
        }

        lastX = x;
        lastY = y;
      }
    }, { passive: false });

    viewer.addEventListener("touchend", (event) => {
      if (event.touches.length > 0) return;

      if (isPinching) {
        isPinching = false;
        if (scale <= 1.03) resetZoom();
        event.preventDefault();
        return;
      }

      const diffX = lastX - startX;
      const diffY = lastY - startY;
      const isHorizontalSwipe = Math.abs(diffX) > 45 && Math.abs(diffX) > Math.abs(diffY);

      if (scale > 1) {
        event.preventDefault();
        return;
      }

      if (isHorizontalSwipe) {
        if (diffX < 0) nextImage();
        else previousImage();
        event.preventDefault();
        return;
      }

      if (!moved) {
        const now = Date.now();
        if (now - lastTapTime < 300) {
          resetZoom();
        } else {
          nextImage();
        }
        lastTapTime = now;
        event.preventDefault();
      }
    }, { passive: false });

    viewer.addEventListener("touchcancel", () => {
      isPinching = false;
      moved = false;
    });

    viewer.addEventListener("click", () => {
      if (Date.now() < suppressClickUntil) return;
      if (scale === 1) nextImage();
    });

    slide.addEventListener("error", () => {
      console.error(`Missing or failed image: ${imageFiles[currentIndex]}`);
    });
  </script>
</body>
</html>
